<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>As-Sunnah Foundation · AI Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Noto Sans Bengali renders bn-BD conjuncts (যুক্তাক্ষর) + মাত্রা correctly; Instrument Sans stays for Latin. -->
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600&family=Noto+Sans+Bengali:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --c-bg: #050509;
    --c-surface: rgba(255,255,255,0.04);
    --c-surface-hover: rgba(255,255,255,0.07);
    --c-text: #c8cad0;
    --c-text-dim: #5a5d66;
    --c-text-bright: #eef0f4;

    /* State palette */
    --c-listen: #4ade80;
    --c-listen-dim: rgba(74,222,128,0.12);
    --c-process: #f59e0b;
    --c-process-dim: rgba(245,158,11,0.12);
    --c-speak: #818cf8;
    --c-speak-dim: rgba(129,140,248,0.12);
    --c-loading: #3a3d46;
    --c-loading-dim: rgba(58,61,70,0.12);

    /* Active state (set by JS) */
    --glow: var(--c-loading);
    --glow-dim: var(--c-loading-dim);

    /* Latin (Instrument Sans) first, Bengali (Noto Sans Bengali) as the glyph fallback for bn text. */
    --font-body: 'Instrument Sans', 'Noto Sans Bengali', system-ui, sans-serif;
    --font-display: 'Syne', 'Noto Sans Bengali', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font-body);
    background: var(--c-bg);
    color: var(--c-text);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* ── Background radial glow ── */
  body::before {
    content: '';
    position: fixed;
    top: 20%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 600px;
    background: radial-gradient(ellipse, var(--glow-dim) 0%, transparent 70%);
    pointer-events: none;
    transition: background 0.6s ease;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    max-width: 720px;
    padding: 20px 8px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 2;
    flex-shrink: 0;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--glow) 0%, transparent 100%);
    opacity: 0.7;
    transition: background 0.4s ease, opacity 0.4s ease;
  }

  .logo h1 {
    font-family: var(--font-body);
    font-size: 20px;
    font-weight: 600;
    color: var(--c-text-bright);
    letter-spacing: 0.01em;
  }

  .model-label {
    font-size: 11px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
  }

  .on-device-pill {
    font-size: 10px;
    font-weight: 500;
    color: var(--c-text-dim);
    letter-spacing: 0.03em;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .on-device-pill svg {
    width: 10px;
    height: 10px;
  }

  .status-pill {
    font-size: 11px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
  }

  .status-pill::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--c-text-dim);
    transition: background 0.3s;
  }
  .status-pill.connected { color: var(--c-listen); background: var(--c-listen-dim); }
  .status-pill.connected::before { background: var(--c-listen); }
  .status-pill.disconnected { color: #f87171; background: rgba(248,113,113,0.1); }
  .status-pill.disconnected::before { background: #f87171; }
  .status-pill.processing { color: var(--c-process); background: var(--c-process-dim); }
  .status-pill.processing::before { background: var(--c-process); }

  /* ── Main stack ── */
  .portal-stack {
    flex: 1;
    width: 100%;
    max-width: 720px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px 8px 16px;
    gap: 0;
    z-index: 2;
    min-height: 0;
  }

  /* ── Webcam viewport ── */
  .viewport-wrap {
    position: relative;
    width: 100%;
    max-width: 640px;
    aspect-ratio: 16/9;
    border-radius: 18px;
    flex-shrink: 0;
  }

  .viewport-wrap.hidden { display: none; }

  .ctrl-group { display: flex; gap: 8px; }

  /* ── Language switch (EN / বাং) ── */
  .lang-switch {
    display: flex;
    gap: 2px;
    background: var(--c-surface);
    border-radius: 100px;
    padding: 2px;
    flex-shrink: 0;
  }
  .lang-switch button {
    font-family: var(--font-body);
    font-size: 10.5px;
    font-weight: 600;
    padding: 4px 9px;
    border: none;
    border-radius: 100px;
    background: transparent;
    color: var(--c-text-dim);
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    letter-spacing: 0.02em;
  }
  .lang-switch button.active { background: var(--c-surface-hover); color: var(--c-text-bright); }
  .lang-switch button:hover:not(.active) { color: var(--c-text); }

  /* Three glow layers */
  .viewport-wrap::before,
  .viewport-wrap::after,
  .viewport-glow {
    content: '';
    position: absolute;
    inset: -3px;
    border-radius: 20px;
    pointer-events: none;
    transition: box-shadow 0.4s ease, opacity 0.4s ease;
  }

  /* Layer 1 — tight inner glow */
  .viewport-wrap::before {
    box-shadow: inset 0 0 30px var(--glow-dim), 0 0 15px var(--glow-dim);
    z-index: 3;
    animation: glow-breathe-1 3s ease-in-out infinite;
  }

  /* Layer 2 — mid spread */
  .viewport-wrap::after {
    box-shadow: 0 0 40px 8px var(--glow-dim);
    z-index: 2;
    animation: glow-breathe-2 4s ease-in-out infinite;
  }

  /* Layer 3 — outer diffuse */
  .viewport-glow {
    inset: -6px;
    border-radius: 22px;
    box-shadow: 0 0 80px 20px var(--glow-dim);
    z-index: 1;
    animation: glow-breathe-3 5s ease-in-out infinite;
  }

  /* State: listening — gentle breathe */
  @keyframes glow-breathe-1 {
    0%, 100% { opacity: 0.6; }
    50% { opacity: 1; }
  }
  @keyframes glow-breathe-2 {
    0%, 100% { opacity: 0.4; }
    50% { opacity: 0.8; }
  }
  @keyframes glow-breathe-3 {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.5; }
  }

  /* State: processing — faster, tighter */
  .viewport-wrap.processing::before { animation-duration: 0.8s; }
  .viewport-wrap.processing::after { animation-duration: 1.1s; }
  .viewport-wrap.processing .viewport-glow { animation-duration: 1.4s; opacity: 0.3; }

  /* State: speaking — smooth pulse driven by JS amplitude */
  .viewport-wrap.speaking::before,
  .viewport-wrap.speaking::after,
  .viewport-wrap.speaking .viewport-glow {
    animation: none;
  }

  /* State: loading — very slow, dim */
  .viewport-wrap.loading::before { animation-duration: 5s; opacity: 0.3; }
  .viewport-wrap.loading::after { animation-duration: 6s; opacity: 0.2; }
  .viewport-wrap.loading .viewport-glow { animation-duration: 7s; opacity: 0.1; }

  video {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 18px;
    background: #0a0a10;
    transform: scaleX(-1);
    position: relative;
    z-index: 2;
  }

  /* ── Waveform canvas ── */
  .waveform-wrap {
    width: 100%;
    max-width: 480px;
    height: 52px;
    margin-top: 16px;
    flex-shrink: 0;
    position: relative;
  }

  #waveform {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* ── Transcript ── */
  .transcript {
    width: 100%;
    max-width: 640px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    margin-top: 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 0 4px 4px;
    scrollbar-width: thin;
    scrollbar-color: rgba(255,255,255,0.08) transparent;
    mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
    -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 12px, black 100%);
  }

  .transcript::-webkit-scrollbar { width: 4px; }
  .transcript::-webkit-scrollbar-track { background: transparent; }
  .transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

  .msg {
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 13.5px;
    line-height: 1.55;
    max-width: 85%;
    animation: msg-in 0.25s ease-out;
  }

  @keyframes msg-in {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .msg.user {
    align-self: flex-end;
    background: rgba(74,222,128,0.08);
    color: #b0d8c0;
    border-bottom-right-radius: 4px;
  }

  .msg.assistant {
    align-self: flex-start;
    background: var(--c-surface);
    color: var(--c-text);
    border-bottom-left-radius: 4px;
  }

  .msg .meta {
    font-size: 10.5px;
    color: var(--c-text-dim);
    margin-top: 5px;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.02em;
  }

  .loading-dots {
    display: inline-flex;
    gap: 4px;
    align-items: center;
    height: 1.55em;
  }

  .loading-dots span {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: rgba(74,222,128,0.5);
    animation: dot-bounce 1.2s ease-in-out infinite;
  }

  .loading-dots span:nth-child(2) { animation-delay: 0.15s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.3s; }

  @keyframes dot-bounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* ── Controls bar ── */
  .controls {
    width: 100%;
    max-width: 640px;
    padding: 12px 4px 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
    z-index: 2;
  }

  .ctrl-btn {
    font-family: var(--font-body);
    font-size: 12px;
    font-weight: 600;
    padding: 8px 16px;
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text-dim);
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.02em;
  }

  /* Permission-status dot before the label: gray=unavailable, amber=prompt, green=granted, red=denied */
  .ctrl-btn::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin-right: 7px;
    vertical-align: middle;
    background: var(--c-text-dim);
    transition: background 0.3s;
  }
  .ctrl-btn.perm-granted::before { background: var(--c-listen); }
  .ctrl-btn.perm-prompt::before  { background: var(--c-process); }
  .ctrl-btn.perm-denied::before  { background: #f87171; }

  .ctrl-btn:hover { background: var(--c-surface-hover); color: var(--c-text); }
  .ctrl-btn.active {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.15);
  }

  .state-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--c-text-dim);
    transition: color 0.3s;
  }

  .state-indicator .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--glow);
    transition: background 0.3s;
    box-shadow: 0 0 8px var(--glow-dim);
  }
  .state-indicator .dot.listening { animation: dot-pulse 2s ease-in-out infinite; }
  .state-indicator .dot.processing { animation: dot-pulse 0.6s ease-in-out infinite; }
  .state-indicator .dot.speaking { animation: dot-pulse 1s ease-in-out infinite; }
  .state-indicator .dot.loading { animation: dot-pulse 2.5s ease-in-out infinite; }

  @keyframes dot-pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.4; transform: scale(0.8); }
  }

  /* ── Text composer ── */
  .composer {
    position: relative;
    width: 100%;
    max-width: 640px;
    display: flex;
    gap: 8px;
    padding: 8px 4px 2px;
    flex-shrink: 0;
    z-index: 2;
  }

  /* Recommended-question popover (above the input) */
  .suggestions {
    position: absolute;
    bottom: calc(100% + 4px);
    left: 4px;
    right: 4px;
    display: none;
    flex-wrap: wrap;
    gap: 6px;
    padding: 10px;
    background: rgba(10,10,16,0.97);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 14px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    z-index: 6;
  }

  .suggestions.open { display: flex; }

  .suggestions .chip {
    font-family: var(--font-body);
    font-size: 12.5px;
    line-height: 1.3;
    padding: 7px 12px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 100px;
    background: var(--c-surface);
    color: var(--c-text);
    cursor: pointer;
    text-align: left;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }

  .suggestions .chip:hover {
    background: var(--c-listen-dim);
    color: var(--c-listen);
    border-color: rgba(74,222,128,0.2);
  }

  /* "Allow" button inside a permission-recommendation message */
  .allow-btn {
    margin-top: 8px;
    font-family: var(--font-body);
    font-size: 12.5px;
    font-weight: 600;
    padding: 7px 14px;
    border: 1px solid rgba(74,222,128,0.25);
    border-radius: 8px;
    background: var(--c-listen-dim);
    color: var(--c-listen);
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
  }
  .allow-btn:hover { background: rgba(74,222,128,0.2); }
  .allow-btn:disabled { opacity: 0.5; cursor: default; }

  .composer input {
    flex: 1;
    min-width: 0;
    font-family: var(--font-body);
    font-size: 13.5px;
    padding: 10px 14px;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    background: var(--c-surface);
    color: var(--c-text-bright);
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  .composer input::placeholder { color: var(--c-text-dim); }
  .composer input:focus { border-color: var(--c-listen); background: var(--c-surface-hover); }

  .composer button {
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    padding: 0 18px;
    border: 1px solid rgba(74,222,128,0.15);
    border-radius: 10px;
    background: var(--c-listen-dim);
    color: var(--c-listen);
    cursor: pointer;
    transition: background 0.2s, opacity 0.2s;
    white-space: nowrap;
  }

  .composer button:hover { background: rgba(74,222,128,0.18); }
  .composer button:disabled { opacity: 0.4; cursor: default; }

</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <h1 id="appName">As-Sunnah Foundation</h1>
  </div>
  <span class="model-label">Gemini Flash · Edge bn-BD</span>
  <div id="langSwitch" class="lang-switch">
    <button type="button" data-lang="en">EN</button>
    <button type="button" data-lang="bn">বাং</button>
  </div>
  <div id="status" class="status-pill disconnected">Disconnected</div>
</header>

<div class="portal-stack">
  <!-- Webcam viewport with glow layers -->
  <div id="viewportWrap" class="viewport-wrap loading hidden">
    <div class="viewport-glow"></div>
    <video id="video" autoplay muted playsinline></video>
  </div>

  <!-- Audio waveform visualizer -->
  <div class="waveform-wrap">
    <canvas id="waveform"></canvas>
  </div>

  <!-- Transcript -->
  <div id="messages" class="transcript"></div>

  <!-- Controls -->
  <div class="controls">
    <div class="ctrl-group">
      <button id="listenToggle" type="button" class="ctrl-btn">Listen</button>
      <button id="cameraToggle" type="button" class="ctrl-btn">Camera Off</button>
    </div>
    <div class="state-indicator">
      <div id="stateDot" class="dot idle"></div>
      <span id="stateText">Ready</span>
    </div>
    <span class="on-device-pill">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M4.5 11.5a3 3 0 0 1-.4-5.97A4 4 0 0 1 12 6.5a2.5 2.5 0 0 1-.5 5z"/></svg>
      <span id="cloudPill">Cloud AI</span>
    </span>
  </div>

  <!-- Text composer — type a question (same WS {text} path the gateway already handles) -->
  <form id="composer" class="composer" autocomplete="off">
    <div id="suggestions" class="suggestions" role="listbox" aria-label="Recommended questions"></div>
    <input id="textInput" type="text" placeholder="Type a question…" aria-label="Type a question" maxlength="500" />
    <button id="sendBtn" type="submit">Send</button>
  </form>
</div>

<script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/ort.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/bundle.min.js"></script>
<script>
const $ = id => document.getElementById(id);
const video = $('video'), cameraToggle = $('cameraToggle'), listenToggle = $('listenToggle');
const messagesDiv = $('messages'), statusEl = $('status');
const stateDot = $('stateDot'), stateText = $('stateText');
const viewportWrap = $('viewportWrap');
const waveformCanvas = $('waveform');
const composer = $('composer'), textInput = $('textInput'), sendBtn = $('sendBtn');
const suggestionsEl = $('suggestions'), langSwitch = $('langSwitch');
const waveformCtx = waveformCanvas.getContext('2d');

// ── i18n (bn-BD) ──
// Single inline locale table for all runtime UI chrome — no framework, keeps the Python diff at zero
// (CLAUDE.md §4). Static chrome (title, model label, cloud pill) is hard-coded in the markup above.
// Timing acronyms LLM/TTS stay Latin on purpose: transliterating them reads unnaturally to bn devs.
const bn = {
  'status.connected': 'সংযুক্ত',
  'status.disconnected': 'সংযোগ বিচ্ছিন্ন',
  'status.processing': 'প্রসেস হচ্ছে',
  'state.loading': 'লোড হচ্ছে…',
  'state.idle': 'প্রস্তুত',
  'state.listening': 'শুনছি',
  'state.processing': 'ভাবছি…',
  'state.speaking': 'বলছি',
  'camera.on': 'ক্যামেরা চালু',
  'camera.off': 'ক্যামেরা বন্ধ',
  'listen.on': 'শুনছি',
  'listen.off': 'শুনুন',
  'perm.camera': 'ক্যামেরা চালু করতে ব্রাউজারের অনুমতি দিন — অ্যাড্রেস বারের ক্যামেরা আইকনে ক্লিক করে "Allow" দিন।',
  'perm.mic': 'ভয়েস কমান্ড ব্যবহার করতে মাইক্রোফোনের অনুমতি দিন — অ্যাড্রেস বারের মাইক আইকনে ক্লিক করে "Allow" দিন।',
  'perm.status.granted': 'অনুমতি দেওয়া আছে',
  'perm.status.denied': 'অনুমতি বন্ধ',
  'perm.status.prompt': 'ক্লিক করলে অনুমতি চাওয়া হবে',
  'perm.status.unavailable': 'অনুপলব্ধ — HTTPS বা localhost প্রয়োজন',
  'perm.allow.mic': '🎤 মাইক্রোফোনের অনুমতি দিন',
  'perm.allow.camera': '📷 ক্যামেরার অনুমতি দিন',
  'meta.withCamera': 'ক্যামেরাসহ',
  'meta.llm': 'LLM {n}s',
  'meta.tts': 'TTS {n}s',
  'app.title': 'আস-সুন্নাহ ফাউন্ডেশন · বাংলা এআই সহকারী',
  'app.name': 'আস-সুন্নাহ ফাউন্ডেশন',
  'pill.cloud': 'ক্লাউড এআই',
  'composer.placeholder': 'প্রশ্ন লিখুন…',
  'composer.send': 'পাঠান',
  'suggest.aria': 'প্রস্তাবিত প্রশ্ন',
};

const en = {
  'status.connected': 'Connected',
  'status.disconnected': 'Disconnected',
  'status.processing': 'Processing',
  'state.loading': 'Loading…',
  'state.idle': 'Ready',
  'state.listening': 'Listening',
  'state.processing': 'Thinking…',
  'state.speaking': 'Speaking',
  'camera.on': 'Camera On',
  'camera.off': 'Camera Off',
  'listen.on': 'Listening',
  'listen.off': 'Listen',
  'perm.camera': 'To use the camera, allow access in your browser — click the camera icon in the address bar and choose "Allow".',
  'perm.mic': 'To use voice commands, allow microphone access — click the mic icon in the address bar and choose "Allow".',
  'perm.status.granted': 'Permission granted',
  'perm.status.denied': 'Permission blocked',
  'perm.status.prompt': 'Click to request permission',
  'perm.status.unavailable': 'Unavailable — needs HTTPS or localhost',
  'perm.allow.mic': '🎤 Allow microphone',
  'perm.allow.camera': '📷 Allow camera',
  'meta.withCamera': 'with camera',
  'meta.llm': 'LLM {n}s',
  'meta.tts': 'TTS {n}s',
  'app.title': 'As-Sunnah Foundation · AI Assistant',

  'composer.send': 'Send',

const locales = { en, bn };
let lang = 'en';   // English is the default
let locale = en;

// t(key[, params]) — look up a string in the active locale ({name} placeholders filled from params).
function t(key, params) {
  let s = locale[key] ?? en[key] ?? key;
  if (params) for (const k in params) s = s.replaceAll(`{${k}}`, params[k]);
  return s;
}

// Apply the active language to all UI chrome (static + current dynamic state).
function applyLocale() {
  document.documentElement.lang = lang;
  document.title = t('app.title');
  const set = (id, txt) => { const el = document.getElementById(id); if (el) el.textContent = txt; };
  set('appName', t('app.name'));
  set('cloudPill', t('pill.cloud'));
  textInput.placeholder = t('composer.placeholder');
  textInput.setAttribute('aria-label', t('composer.placeholder'));
  sendBtn.textContent = t('composer.send');
  suggestionsEl.setAttribute('aria-label', t('suggest.aria'));
  // Reflect current dynamic state in the new language.
  stateText.textContent = t(`state.${state}`);
  listenToggle.textContent = voiceEnabled ? t('listen.on') : t('listen.off');
  cameraToggle.textContent = cameraEnabled ? t('camera.on') : t('camera.off');
  const scls = statusEl.classList.contains('connected') ? 'connected'
    : statusEl.classList.contains('processing') ? 'processing' : 'disconnected';
  statusEl.textContent = t(`status.${scls}`);
  for (const btn of [listenToggle, cameraToggle]) {
    const s = btn.classList.contains('perm-granted') ? 'granted'
      : btn.classList.contains('perm-denied') ? 'denied'
      : btn.classList.contains('perm-prompt') ? 'prompt' : 'unavailable';
    btn.title = t(`perm.status.${s}`);
  }
  for (const b of langSwitch.querySelectorAll('button')) b.classList.toggle('active', b.dataset.lang === lang);
}

function setLang(l) {
  if (!locales[l]) return;
  lang = l;
  locale = locales[l];
  applyLocale();
}

let ws, micStream, cameraStream, myvad;
let cameraEnabled = false;   // camera is opt-in (off by default)
let voiceEnabled = false;    // voice/listening is opt-in (off by default)
let audioCtx, currentSource;
let state = 'loading';
let ignoreIncomingAudio = false;
let turnTimer = null;   // fallback: recover to 'listening' if a turn ends without audio

// Streaming audio playback state
let streamSampleRate = 24000;
let streamNextTime = 0;         // When to schedule next chunk
let streamSources = [];         // Active AudioBufferSourceNodes
let streamTtsTime = null;

// ── Waveform Visualizer ──
let analyser, micSource;
const BAR_COUNT = 40;
const BAR_GAP = 3;
let waveformRAF;
let ambientPhase = 0;

function initWaveformCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = waveformCanvas.getBoundingClientRect();
  waveformCanvas.width = rect.width * dpr;
  waveformCanvas.height = rect.height * dpr;
  waveformCtx.scale(dpr, dpr);
}

function getStateColor() {
  const colors = { listening: '#4ade80', processing: '#f59e0b', speaking: '#818cf8', loading: '#3a3d46' };
  return colors[state] || colors.loading;
}

function drawWaveform() {
  const w = waveformCanvas.getBoundingClientRect().width;
  const h = waveformCanvas.getBoundingClientRect().height;
  waveformCtx.clearRect(0, 0, w, h);

  const barWidth = (w - (BAR_COUNT - 1) * BAR_GAP) / BAR_COUNT;
  const color = getStateColor();
  waveformCtx.fillStyle = color;

  let dataArray = null;
  if (analyser) {
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteFrequencyData(dataArray);
  }

  for (let i = 0; i < BAR_COUNT; i++) {
    let amplitude;
    if (dataArray) {
      // Map bar index to frequency bin
      const binIndex = Math.floor((i / BAR_COUNT) * dataArray.length * 0.6);
      amplitude = dataArray[binIndex] / 255;
    }

    // If no real audio data or very quiet, use ambient drift
    if (!dataArray || amplitude < 0.02) {
      ambientPhase += 0.0001;
      const drift = Math.sin(ambientPhase * 3 + i * 0.4) * 0.5 + 0.5;
      amplitude = 0.03 + drift * 0.04;
    }

    const barH = Math.max(2, amplitude * (h - 4));
    const x = i * (barWidth + BAR_GAP);
    const y = (h - barH) / 2;

    waveformCtx.globalAlpha = 0.3 + amplitude * 0.7;
    waveformCtx.beginPath();
    const r = Math.min(barWidth / 2, barH / 2, 3);
    waveformCtx.roundRect(x, y, barWidth, barH, r);
    waveformCtx.fill();
  }

  waveformCtx.globalAlpha = 1;
  waveformRAF = requestAnimationFrame(drawWaveform);
}

// ── Dynamic glow intensity for speaking state ──
function updateSpeakingGlow() {
  if (state !== 'speaking' || !analyser) return;
  const data = new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteFrequencyData(data);
  let sum = 0;
  for (let i = 0; i < data.length; i++) sum += data[i];
  const avg = sum / data.length / 255;
  // Modulate the glow layers based on audio amplitude
  const intensity = 0.3 + avg * 0.7;
  viewportWrap.style.setProperty('--speak-intensity', intensity);
  const spread = 20 + avg * 60;
  const inner = 15 + avg * 25;
  viewportWrap.querySelector('.viewport-glow').style.boxShadow =
    `0 0 ${spread}px ${spread * 0.4}px rgba(129,140,248,${intensity * 0.25})`;
  viewportWrap.style.boxShadow =
    `inset 0 0 ${inner}px rgba(129,140,248,${intensity * 0.15}), 0 0 ${inner}px rgba(129,140,248,${intensity * 0.2})`;
  requestAnimationFrame(updateSpeakingGlow);
}

// The "ready for input" state depends on whether voice is enabled.
function readyState() { return voiceEnabled ? 'listening' : 'idle'; }

// ── State Machine ──
function setState(newState) {
  state = newState;

  // Update state indicator
  stateDot.className = `dot ${newState}`;
  stateText.textContent = t(`state.${newState}`);

  // Update viewport glow class — keep it hidden whenever the camera is off.
  viewportWrap.className = `viewport-wrap ${newState}${cameraEnabled ? '' : ' hidden'}`;

  // Reset inline styles from speaking glow
  if (newState !== 'speaking') {
    viewportWrap.style.boxShadow = '';
    viewportWrap.querySelector('.viewport-glow').style.boxShadow = '';
  }

  // Update CSS custom properties for state color (must use resolved values, not nested var())
  const stateVars = {
    listening: ['#4ade80', 'rgba(74,222,128,0.12)'],
    processing: ['#f59e0b', 'rgba(245,158,11,0.12)'],
    speaking: ['#818cf8', 'rgba(129,140,248,0.12)'],
    loading: ['#3a3d46', 'rgba(58,61,70,0.12)'],
  };
  const [glow, glowDim] = stateVars[newState] || stateVars.loading;
  document.documentElement.style.setProperty('--glow', glow);
  document.documentElement.style.setProperty('--glow-dim', glowDim);

  // Kick off speaking glow animation
  if (newState === 'speaking') requestAnimationFrame(updateSpeakingGlow);

  // Raise VAD threshold during speaking to reduce echo false triggers
  if (myvad) {
    myvad.setOptions({ positiveSpeechThreshold: newState === 'speaking' ? 0.92 : 0.5 });
  }

  // Connect/disconnect mic analyser based on state
  if (newState === 'listening' && micStream && audioCtx && analyser) {
    if (!micSource) {
      micSource = audioCtx.createMediaStreamSource(micStream);
    }
    try { micSource.connect(analyser); } catch {}
  } else if (micSource && newState !== 'listening') {
    try { micSource.disconnect(analyser); } catch {}
  }
}

// ── WebSocket ──
function connect() {
  ws = new WebSocket(`${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws`);
  ws.onopen = () => {
    setStatus('connected');
    if (state === 'loading') setState(readyState());
  };
  ws.onclose = () => {
    setStatus('disconnected');
    setTimeout(connect, 2000);
  };
  ws.onmessage = ({ data }) => {
    const msg = JSON.parse(data);
    if (msg.type === 'text') {
      if (msg.transcription) {
        const userMsgs = messagesDiv.querySelectorAll('.msg.user');
        const lastUserMsg = userMsgs[userMsgs.length - 1];
        if (lastUserMsg) {
          const meta = lastUserMsg.querySelector('.meta');
          lastUserMsg.innerHTML = `${msg.transcription}${meta ? meta.outerHTML : ''}`;
        }
      }
      addMessage('assistant', msg.text, t('meta.llm', { n: msg.llm_time }));
      // If no audio follows (error reply / empty TTS), don't get stuck in 'processing'.
      clearTimeout(turnTimer);
      turnTimer = setTimeout(() => {
        if (state === 'processing') { setState(readyState()); setStatus('connected'); }
      }, 2500);
    } else if (msg.type === 'audio_start') {
      if (ignoreIncomingAudio) return;
      clearTimeout(turnTimer); // audio is coming; playback completion restores 'listening'
      streamSampleRate = msg.sample_rate || 24000;
      startStreamPlayback();
    } else if (msg.type === 'audio_chunk') {
      if (ignoreIncomingAudio) return;
      queueAudioChunk(msg.audio);
    } else if (msg.type === 'audio_end') {
      clearTimeout(turnTimer);
      if (ignoreIncomingAudio) {
        ignoreIncomingAudio = false;
        stopPlayback();
        setState(readyState());
        setStatus('connected');
        return;
      }
      streamTtsTime = msg.tts_time;
      const meta = messagesDiv.querySelector('.msg.assistant:last-child .meta');
      if (meta) meta.textContent += ` · ${t('meta.tts', { n: msg.tts_time })}`;
      // Terminal safety net: if nothing is (still) playing, return to the ready state.
      if (streamSources.length === 0 && state !== 'listening' && state !== 'idle') { setState(readyState()); setStatus('connected'); }
    }
  };
}

function setStatus(cls) { statusEl.className = `status-pill ${cls}`; statusEl.textContent = t(`status.${cls}`); }

// ── Media permission helper ──
// Pre-checks the Permissions API (where supported); on denial or getUserMedia failure it recommends
// enabling the permission rather than silently doing nothing.
async function getMedia(constraints, kind) { // kind: 'camera' | 'microphone'
  try {
    if (navigator.permissions && navigator.permissions.query) {
      const st = await navigator.permissions.query({ name: kind }).catch(() => null);
      if (st && st.state === 'denied') { recommend(kind); return null; }
    }
    return await navigator.mediaDevices.getUserMedia(constraints);
  } catch (e) {
    console.warn(`${kind} permission/getUserMedia failed:`, e && e.name);
    recommend(kind);
    return null;
  }
}
function recommend(kind) {
  // An actionable message: text hint + an "Allow" button that re-requests the device (which pops the
  // browser's permission prompt when the permission is in the 'prompt' state).
  const div = document.createElement('div');
  div.className = 'msg assistant';
  const p = document.createElement('div');
  p.textContent = kind === 'camera' ? t('perm.camera') : t('perm.mic');
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'allow-btn';
  btn.textContent = kind === 'camera' ? t('perm.allow.camera') : t('perm.allow.mic');
  btn.addEventListener('click', () => {
    btn.disabled = true;
    Promise.resolve(kind === 'camera' ? enableCamera() : enableListening()).finally(() => { btn.disabled = false; });
  });
  div.appendChild(p);
  div.appendChild(btn);
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

// ── Permission-status indicators (colored dot on the Camera / Listen buttons) ──
function setPermClass(btn, state) {
  const s = ['granted', 'denied', 'prompt'].includes(state) ? state : 'unavailable';
  btn.classList.remove('perm-granted', 'perm-denied', 'perm-prompt');
  if (s !== 'unavailable') btn.classList.add(`perm-${s}`);
  btn.title = t(`perm.status.${s}`);
}
async function queryPerm(name) { // 'camera' | 'microphone'
  try {
    if (navigator.mediaDevices && navigator.permissions && navigator.permissions.query) {
      return await navigator.permissions.query({ name });
    }
  } catch {}
  return null; // insecure context or unsupported (e.g. Firefox) → "unavailable"
}
async function bindPerm(btn, name, enableFn, isOn) {
  const apply = (state) => {
    setPermClass(btn, state);
    if (state === 'granted' && !isOn()) enableFn(); // already/now allowed → switch the toggle on
  };
  const st = await queryPerm(name);
  apply(st ? st.state : 'unavailable');             // on-page-load case
  if (st) st.onchange = () => apply(st.state);        // allowed later (e.g. via the address bar)
}
async function refreshPerm(btn, name) {
  const st = await queryPerm(name);
  setPermClass(btn, st ? st.state : 'unavailable');
}

// ── Camera (opt-in) ──
async function enableCamera() {
  const stream = await getMedia({ video: { width: 640, height: 480, facingMode: 'user' } }, 'camera');
  if (!stream) { refreshPerm(cameraToggle, 'camera'); return; }
  cameraStream = stream;
  video.srcObject = stream;
  video.style.opacity = 1;
  cameraEnabled = true;
  cameraToggle.classList.add('active');
  cameraToggle.textContent = t('camera.on');
  viewportWrap.classList.remove('hidden');
  refreshPerm(cameraToggle, 'camera');
}
function disableCamera() {
  if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
  video.srcObject = null;
  cameraEnabled = false;
  cameraToggle.classList.remove('active');
  cameraToggle.textContent = t('camera.off');
  viewportWrap.classList.add('hidden');
}

// ── Voice / listening (opt-in) ──
async function enableListening() {
  const stream = await getMedia({ audio: { echoCancellation: true, noiseSuppression: true, autoGainControl: true } }, 'microphone');
  if (!stream) { refreshPerm(listenToggle, 'microphone'); return; }
  micStream = stream;
  micSource = null; // recreated for the analyser on setState('listening')
  // Permission is granted (we got a stream) → switch the toggle on immediately.
  voiceEnabled = true;
  listenToggle.classList.add('active');
  listenToggle.textContent = t('listen.on');
  refreshPerm(listenToggle, 'microphone');
  setState('listening');
  startVad();
}

// VAD needs a running AudioContext, which browsers only allow after a user gesture (autoplay policy).
// If it's suspended (e.g. auto-enabled on page load with no interaction yet), defer the actual VAD
// start to the first click/keypress — so the toggle can switch on now and detection begins on interaction.
async function startVad() {
  if (!voiceEnabled || !micStream) return;
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') { try { await audioCtx.resume(); } catch {} }
  if (audioCtx.state === 'suspended') {
    const onGesture = () => {
      document.removeEventListener('click', onGesture);
      document.removeEventListener('keydown', onGesture);
      startVad();
    };
    document.addEventListener('click', onGesture, { once: true });
    document.addEventListener('keydown', onGesture, { once: true });
    return;
  }
  try {
    if (!myvad) {
      myvad = await vad.MicVAD.new({
        getStream: async () => new MediaStream(micStream.getAudioTracks()),
        positiveSpeechThreshold: 0.5,
        negativeSpeechThreshold: 0.25,
        redemptionMs: 600,
        minSpeechMs: 300,
        preSpeechPadMs: 300,
        onSpeechStart: handleSpeechStart,
        onSpeechEnd: handleSpeechEnd,
        onVADMisfire: () => console.log('VAD misfire (too short)'),
        onnxWASMBasePath: "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.22.0/dist/",
        baseAssetPath: "https://cdn.jsdelivr.net/npm/@ricky0123/vad-web@0.0.29/dist/",
      });
    }
    if (voiceEnabled) myvad.start(); // may have been toggled off while VAD was initializing
  } catch (e) {
    console.warn('VAD init failed:', e);
  }
}
function disableListening() {
  if (myvad) { try { myvad.pause(); } catch {} myvad = null; }
  if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
  if (micSource) { try { micSource.disconnect(); } catch {} micSource = null; }
  voiceEnabled = false;
  listenToggle.classList.remove('active');
  listenToggle.textContent = t('listen.off');
  if (state === 'listening') setState('idle');
}

function captureFrame() {
  if (!cameraEnabled || !video.videoWidth) return null;
  const canvas = document.createElement('canvas');
  const scale = 320 / video.videoWidth;
  canvas.width = 320; canvas.height = video.videoHeight * scale;
  canvas.getContext('2d').drawImage(video, 0, 0, canvas.width, canvas.height);
  return canvas.toDataURL('image/jpeg', 0.7).split(',')[1];
}

// ── VAD Handlers ──
let speakingStartedAt = 0;
const BARGE_IN_GRACE_MS = 800; // Ignore VAD triggers shortly after TTS starts (echo)

function handleSpeechStart() {
  if (state === 'speaking') {
    // Ignore echo: don't allow barge-in right after TTS starts playing
    if (Date.now() - speakingStartedAt < BARGE_IN_GRACE_MS) {
      console.log('Barge-in suppressed (echo grace period)');
      return;
    }
    stopPlayback();
    ignoreIncomingAudio = true;
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({ type: 'interrupt' }));
    }
    setState('listening');
    console.log('Barge-in: interrupted playback');
  }
}

function handleSpeechEnd(audio) {
  if (state !== 'listening') return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;

  const wavBase64 = float32ToWavBase64(audio);
  const imageBase64 = captureFrame();

  setState('processing');
  setStatus('processing');
  addMessage('user', '<span class="loading-dots"><span></span><span></span><span></span></span>', imageBase64 ? t('meta.withCamera') : '');

  const payload = { audio: wavBase64 };
  if (imageBase64) payload.image = imageBase64;
  ws.send(JSON.stringify(payload));
}

// ── Float32 @ 16kHz → WAV base64 ──
function float32ToWavBase64(samples) {
  const buf = new ArrayBuffer(44 + samples.length * 2);
  const v = new DataView(buf);
  const w = (o, s) => { for (let i = 0; i < s.length; i++) v.setUint8(o + i, s.charCodeAt(i)); };
  w(0,'RIFF'); v.setUint32(4, 36 + samples.length * 2, true); w(8,'WAVE'); w(12,'fmt ');
  v.setUint32(16, 16, true); v.setUint16(20, 1, true); v.setUint16(22, 1, true);
  v.setUint32(24, 16000, true); v.setUint32(28, 32000, true); v.setUint16(32, 2, true);
  v.setUint16(34, 16, true); w(36,'data'); v.setUint32(40, samples.length * 2, true);
  for (let i = 0; i < samples.length; i++) {
    const s = Math.max(-1, Math.min(1, samples[i]));
    v.setInt16(44 + i * 2, s < 0 ? s * 0x8000 : s * 0x7FFF, true);
  }
  const bytes = new Uint8Array(buf);
  let bin = ''; for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
  return btoa(bin);
}

// ── Streaming Playback ──
function stopPlayback() {
  for (const src of streamSources) {
    try { src.stop(); } catch {}
  }
  streamSources = [];
  currentSource = null;
  streamNextTime = 0;
}

function ensureAudioCtx() {
  if (!audioCtx) {
    audioCtx = new AudioContext();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.75;
  }
}

function startStreamPlayback() {
  stopPlayback();
  ensureAudioCtx();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  streamNextTime = audioCtx.currentTime + 0.05; // Small initial buffer
  speakingStartedAt = Date.now();
  setState('speaking');
}

function queueAudioChunk(base64Pcm) {
  ensureAudioCtx();

  // Decode base64 -> Int16 PCM -> Float32
  const bin = atob(base64Pcm);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  const int16 = new Int16Array(bytes.buffer);
  const float32 = new Float32Array(int16.length);
  for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

  // Create AudioBuffer and schedule it
  const audioBuffer = audioCtx.createBuffer(1, float32.length, streamSampleRate);
  audioBuffer.getChannelData(0).set(float32);

  const source = audioCtx.createBufferSource();
  source.buffer = audioBuffer;
  source.connect(audioCtx.destination);
  source.connect(analyser);

  // Schedule gapless playback
  const startAt = Math.max(streamNextTime, audioCtx.currentTime);
  source.start(startAt);
  streamNextTime = startAt + audioBuffer.duration;

  streamSources.push(source);
  currentSource = source;

  // Clean up when this chunk finishes
  source.onended = () => {
    const idx = streamSources.indexOf(source);
    if (idx !== -1) streamSources.splice(idx, 1);
    // If this was the last chunk and no more are queued, return to the ready state
    if (streamSources.length === 0 && state === 'speaking') {
      currentSource = null;
      setState(readyState());
      setStatus('connected');
    }
  };
}

// ── UI ──
function addMessage(role, text, meta) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = `${text}${meta ? `<div class="meta">${meta}</div>` : ''}`;
  messagesDiv.appendChild(div);
  messagesDiv.scrollTop = messagesDiv.scrollHeight;
}

cameraToggle.addEventListener('click', () => { cameraEnabled ? disableCamera() : enableCamera(); });
listenToggle.addEventListener('click', () => { voiceEnabled ? disableListening() : enableListening(); });
langSwitch.addEventListener('click', (e) => { const b = e.target.closest('button'); if (b && b.dataset.lang) setLang(b.dataset.lang); });

// ── Text composer ── type a question; same {text} WS path the gateway already handles.
function escapeHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function sendText() {
  const text = textInput.value.trim();
  if (!text) return;
  if (!ws || ws.readyState !== WebSocket.OPEN) return;
  if (state === 'processing') return; // a turn is already in flight

  // If the assistant is speaking, interrupt it first (same barge-in as voice).
  if (state === 'speaking') {
    stopPlayback();
    ignoreIncomingAudio = true;
    ws.send(JSON.stringify({ type: 'interrupt' }));
  }

  textInput.value = '';
  setState('processing');
  setStatus('processing');
  addMessage('user', escapeHtml(text)); // escaped — user text goes through innerHTML in addMessage
  ws.send(JSON.stringify({ text }));
}

composer.addEventListener('submit', (e) => { e.preventDefault(); sendText(); });

// ── Recommended questions (fetched from the knowledge base via /suggestions) ──
function buildSuggestionChips(questions) {
  suggestionsEl.innerHTML = '';
  for (const q of questions) {
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip';
    b.textContent = q;
    // mousedown fires before the input's blur, so we can set the value without the popover closing first.
    b.addEventListener('mousedown', (e) => {
      e.preventDefault();
      textInput.value = q;   // set into the prompt (not auto-sent — user can edit or press Enter)
      hideSuggestions();
      textInput.focus();
    });
    suggestionsEl.appendChild(b);
  }
}

function showSuggestions() { if (suggestionsEl.children.length && !textInput.value.trim()) suggestionsEl.classList.add('open'); }
function hideSuggestions() { suggestionsEl.classList.remove('open'); }

textInput.addEventListener('focus', showSuggestions);
textInput.addEventListener('input', () => (textInput.value.trim() ? hideSuggestions() : showSuggestions()));
textInput.addEventListener('blur', () => setTimeout(hideSuggestions, 120));
textInput.addEventListener('keydown', (e) => { if (e.key === 'Escape') hideSuggestions(); });

async function loadSuggestions() {
  // Fallback aligns with the KB in case the endpoint is unavailable.
  let questions = ['দান করার ব্যাংক অ্যাকাউন্ট নম্বর দাও', 'যাকাত কীভাবে দেব?', 'আস-সুন্নাহ ফাউন্ডেশনের অফিস কোথায়?'];
  try {
    const r = await fetch('/suggestions');
    if (r.ok) { const j = await r.json(); if (Array.isArray(j.questions) && j.questions.length) questions = j.questions; }
  } catch {}
  buildSuggestionChips(questions);
}
loadSuggestions();

// ── Init ──
function init() {
  initWaveformCanvas();
  window.addEventListener('resize', initWaveformCanvas);

  connect();

  // Camera + voice are opt-in via the buttons — nothing is acquired on load, so there is no
  // camera/mic permission prompt until the user asks for it. Text input works without either.
  cameraEnabled = false;
  voiceEnabled = false;
  viewportWrap.classList.add('hidden');
  setState('idle');
  applyLocale();   // English by default; marks the active language button

  // Show live camera/mic permission status on the buttons, and auto-switch a toggle on when its
  // permission is already/becomes granted (reactively on grant/deny).
  bindPerm(listenToggle, 'microphone', enableListening, () => voiceEnabled);
  bindPerm(cameraToggle, 'camera', enableCamera, () => cameraEnabled);

  drawWaveform();
  console.log('Ready — camera and voice are opt-in.');
}

init();
</script>
